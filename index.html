<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Destination Selector</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-criteria { margin: 5px; }
    .result { margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="app" class="container text-center my-5">
    <h1>Select Your Travel Criteria</h1>
    <div class="d-flex justify-content-center flex-wrap my-4">
      <button class="btn btn-primary btn-criteria" @click="select('Green Travel')">Green Travel</button>
      <button class="btn btn-secondary btn-criteria" @click="select('Interests-Based Recommendation')">Interests-Based Recommendation</button>
      <button class="btn btn-success btn-criteria" @click="select('Events')">Events</button>
      <button class="btn btn-danger btn-criteria" @click="select('Cheapest Destination')">Cheapest Destination</button>
      <button class="btn btn-warning btn-criteria" @click="select('Custom Criteria')">Custom Criteria</button>
    </div>
    <div class="result" v-if="selected">
      <h2>Selected Criteria:</h2>
      <p>{{ selected }}</p>
    </div>
  </div>

  <!-- Vue.js -->
  <script src="https://unpkg.com/vue@3.2.47/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return { selected: null };
      },
      methods: {
        select(criteria) {
          this.selected = criteria;
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
