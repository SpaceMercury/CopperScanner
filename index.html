<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Destination Selector</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="text-center">
    <h1>Choose Your Travel Criteria</h1>
  </header>

  <main id="app" class="container">
    <form @submit.prevent="showSelection" id="criteriaForm">
      <div class="criteria-group">
        <div class="form-check" v-for="option in options" :key="option">
          <input
            class="form-check-input"
            type="checkbox"
            :id="option"
            :value="option"
            v-model="selected"
            @change="toggleInput(option)"
          >
          <label class="form-check-label" :for="option">
            {{ option }}
          </label>

          <!-- dynamic input for details -->
          <div v-if="showInput[option]" class="criteria-input-container">
            <input
              class="criteria-input"
              type="text"
              v-model="details[option]"
              :placeholder="`What interests you about ${option}?`"
            >
          </div>
        </div>
      </div>

      <div class="text-center">
        <button type="submit" class="btn-submit">Submit</button>
      </div>
    </form>

    <section class="result" v-if="submitted">
      <h2>Selected Criteria & Details:</h2>
      <ul class="list-group">
        <li class="list-group-item" v-for="option in selected" :key="option">
          <strong>{{ option }}:</strong> {{ details[option] || 'No details provided.' }}
        </li>
      </ul>
    </section>
  </main>

  <footer class="text-center">
    <p>&copy; 2025 Travel Selector Inc.</p>
  </footer>

  <script src="https://unpkg.com/vue@3.2.47/dist/vue.global.prod.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
